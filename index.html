<!DOCTYPE html>
<html lang="uk">

    <main>

                    <button type="submit">Додати</button>
                </form>
            </fieldset>
            
                <ul>

                </ul>
                
        </section>

        <section class="right-side">
            
            <h2>Залишилося</h2>
            <hr>
            <div class="left-items-section" id="left-items">
            </div>
                        
            <h2>Куплено</h2>
            <hr>
            <div class="left-items-section" id="bought-items">
            </div>
			
        </section>
        <div class="badge">Buy List</div>
    </main>

</html>
